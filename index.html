<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>اتاق فرمان عرفان</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .app-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        /* استایل بخش تایمر */
        .timer-box {
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px dashed #38bdf8;
        }
        input[type="number"] {
            width: 80px;
            background: #1e293b;
            border: 2px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-left: 10px;
        }
        input:focus { border-color: #38bdf8; outline: none; }
        
        .countdown-display {
            font-size: 32px;
            font-weight: bold;
            color: #f59e0b;
            margin-top: 15px;
            font-family: monospace;
        }
        
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:active { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>⚙️ اتاق فرمان عرفان</h1>
        <p>تنظیم زمان معکوس برای شلیک نوتیفیکیشن هشدار</p>
        
        <div class="timer-box">
            <label>زمان (به ثانیه): </label>
            <input type="number" id="timeInput" value="5" min="1">
            <div class="countdown-display" id="countdownView">00</div>
        </div>
        
        <button onclick="startCountdown()">شروع شمارش معکوس ⚡</button>
    </div>

    <script>
        let timerInterval;

        // به محض لود شدن، اجازه نوتیفیکیشن را از کاربر بگیر
        document.addEventListener('DOMContentLoaded', () => {
            if ('Notification' in window) {
                Notification.requestPermission().then(perm => {
                    console.log("وضعیت دسترسی نوتیفیکیشن:", perm);
                });
            }
        });

        function startCountdown() {
            clearInterval(timerInterval);
            let seconds = parseInt(document.getElementById('timeInput').value);
            const display = document.getElementById('countdownView');
            
            if (isNaN(seconds) || seconds <= 0) {
                alert("لطفاً یک زمان معتبر وارد کن مهندس! ⏱️");
                return;
            }

            display.innerText = seconds;

            timerInterval = setInterval(() => {
                seconds--;
                display.innerText = seconds;

                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    sendNotification(); // شلیک نوتیفیکیشن نهایی
                }
            }, 1000);
        }

        function sendNotification() {
            if (Notification.permission === 'granted') {
                // ارسال نوتیفیکیشن از طریق سرویس ورکر (روال استاندارد PWA)
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification('⚠️ هشدار اتاق فرمان!', {
                        body: 'زمان معکوس به پایان رسید و موتور با موفقیت چک شد! 🚀',
                        icon: 'https://cdn-icons-png.flaticon.com/512/9343/9343058.png',
                        vibrate: [200, 100, 200],
                        badge: 'https://cdn-icons-png.flaticon.com/512/9343/9343058.png'
                    });
                });
            } else {
                alert("زمان تموم شد! (اما اجازه نوتیفیکیشن رو به مرورگر ندادی 🔔)");
            }
        }

        // فعال کردن سرویس ورکر
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Active ✅"));
        }
    </script>
</body>
</html>
